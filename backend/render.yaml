# Render Blueprint for the TVK backend.
# Either:
#   • Push this repo to Render, click "New +" → "Blueprint" → select this repo,
#     set the root directory to `backend`, fill in env vars, and deploy.
#   • Or create a Web Service manually with the build/start commands below
#     and paste env vars from backend/.env.example
services:
  - type: web
    name: tvk-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ALLOWED_ORIGINS
        sync: false   # e.g. https://tvk-admin.vercel.app
      - key: MONGODB_URI
        sync: false
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: BACKEND_URL
        sync: false   # set this AFTER first deploy (e.g. https://tvk-backend.onrender.com)
      - key: FRONTEND_URL
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_PHONE_NUMBER_ID
        sync: false
      - key: META_WABA_ID
        sync: false
      - key: META_VERIFY_TOKEN
        value: tvk_verify_token
      - key: META_GRAPH_VERSION
        value: v22.0
      - key: WHATSAPP_FLOW_ID
        sync: false
      - key: WHATSAPP_FLOW_STATUS
        value: PUBLISHED
      - key: FLOW_PRIVATE_KEY
        sync: false
      - key: FLOW_PUBLIC_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
